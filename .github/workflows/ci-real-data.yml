name: CI — real-data smoke tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  real-data-smoke:
    name: Real-data smoke tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # dev/test tools
          pip install pytest

      - name: Start Flask app (background)
        env:
          FLASK_ENV: development
        run: |
          python start_app.py &
          echo "Waiting for server to become available..."
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:5000/api/health >/dev/null 2>&1; then
              echo "Server is up"
              break
            fi
            sleep 1
          done

      - name: Run real-data-only smoke test
        run: |
          python test_no_fallback_data.py

      - name: Run unit tests (pytest)
        run: |
          pytest -q tests/test_dashboard_init.py

      - name: Archive server logs (if any failures)
        if: failure()
        run: |
          ps aux | grep start_app || true
          curl -s http://127.0.0.1:5000/api/health || true
